<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--void); padding: 24px; display: flex; flex-wrap: wrap; gap: 14px; align-items: flex-start; }
  .group { display: flex; flex-direction: column; gap: 8px; }
  .group-label { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); }
  button { cursor: pointer; }
</style>
</head>
<body>
  <div class="group">
    <div class="group-label">Primary</div>
    <button class="btn btn-primary">Enter Maze</button>
    <button class="btn btn-primary" style="font-size:18px;padding:14px 28px;">TURN UP 🔊</button>
  </div>
  <div class="group">
    <div class="group-label">Nav / Portal</div>
    <button class="btn btn-nav">Download Share Card</button>
    <button class="btn btn-nav" style="font-size:13px">Run It Back</button>
  </div>
  <div class="group">
    <div class="group-label">Ghost / Secondary</div>
    <button class="btn btn-ghost">Aura Tax Replay</button>
    <button class="btn btn-ghost" style="font-size:13px">Skip</button>
  </div>
  <div class="group">
    <div class="group-label">Warn / Aura Tax</div>
    <button class="btn btn-warn">Aura Tax Replay</button>
  </div>
</body>
</html>
