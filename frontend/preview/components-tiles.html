<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--void); padding: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
  .tile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 340px; }
  .group-label { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); width: 100%; }
  .tile-text { display: flex; align-items: center; justify-content: center; height: 56px; font-family: var(--font-body); font-weight: 700; font-size: 15px; color: var(--off-white); }
  .tile-image { height: 72px; display: flex; align-items: center; justify-content: center; }
  .img-placeholder { width: 56px; height: 46px; border-radius: 6px; background: var(--ink-light); border: 1px dashed rgba(185,174,232,.3); display: flex; align-items: center; justify-content: center; font-size: 20px; }
</style>
</head>
<body>
  <div class="group-label" style="margin-bottom:-4px">Gate Option Tiles — States</div>
  <div class="tile-grid">
    <div class="gate-tile tile-text">Such wow</div>
    <div class="gate-tile tile-text" style="border-color:var(--electric-blue);box-shadow:0 0 14px rgba(0,240,255,.35);transform:translateY(-3px) scale(1.02)">Erm sigma</div>
    <div class="gate-tile tile-text" style="border-color:var(--acid-green);box-shadow:0 0 14px rgba(57,255,20,.35)">OK Boomer ✓</div>
    <div class="gate-tile tile-text" style="border-color:var(--warning-orange);box-shadow:0 0 10px rgba(255,159,28,.3);color:var(--warning-orange)">Cursed path</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px">
    <div class="group-label">Image Tile</div>
    <div class="gate-tile tile-image" style="width:160px">
      <div class="img-placeholder">🐕</div>
    </div>
    <div class="gate-tile tile-image" style="width:160px;border-color:var(--acid-green);box-shadow:0 0 14px rgba(57,255,20,.35)">
      <div class="img-placeholder" style="border-color:rgba(57,255,20,.4)">🐸</div>
    </div>
  </div>
</body>
</html>
