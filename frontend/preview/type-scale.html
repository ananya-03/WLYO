<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--void); padding: 20px 28px; display: flex; flex-direction: column; gap: 6px; }
  .scale-row { display: flex; align-items: baseline; gap: 16px; }
  .sz-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--dim); width: 56px; flex-shrink: 0; }
  .sz-text { font-family: var(--font-display); color: var(--off-white); line-height: 1.1; }
</style>
</head>
<body>
  <div class="scale-row"><div class="sz-label">6xl · 112</div><div class="sz-text" style="font-size:64px">Aa</div></div>
  <div class="scale-row"><div class="sz-label">5xl · 80</div><div class="sz-text" style="font-size:48px">Aa</div></div>
  <div class="scale-row"><div class="sz-label">4xl · 56</div><div class="sz-text" style="font-size:40px">Aa</div></div>
  <div class="scale-row"><div class="sz-label">3xl · 40</div><div class="sz-text" style="font-size:32px">Aa</div></div>
  <div class="scale-row"><div class="sz-label">2xl · 32</div><div class="sz-text" style="font-size:26px; font-family: var(--font-body); font-weight:700">Aa</div></div>
  <div class="scale-row"><div class="sz-label">xl · 24</div><div class="sz-text" style="font-size:22px; font-family: var(--font-body); font-weight:700">Aa</div></div>
  <div class="scale-row"><div class="sz-label">lg · 20</div><div class="sz-text" style="font-size:18px; font-family: var(--font-body);">Aa</div></div>
  <div class="scale-row"><div class="sz-label">base · 16</div><div class="sz-text" style="font-size:15px; font-family: var(--font-body);">Aa</div></div>
  <div class="scale-row"><div class="sz-label">sm · 14</div><div class="sz-text" style="font-size:13px; font-family: var(--font-body); color: var(--muted-lavender);">Aa</div></div>
  <div class="scale-row"><div class="sz-label">xs · 12</div><div class="sz-text" style="font-size:11px; font-family: var(--font-body); color: var(--dim);">Aa</div></div>
</body>
</html>
