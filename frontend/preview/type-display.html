<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--void); padding: 28px 32px; display: flex; flex-direction: column; gap: 20px; }
  .specimen { display: flex; flex-direction: column; gap: 2px; }
  .tag { font-family: var(--font-body); font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
  .display-hero { font-family: var(--font-display); font-size: 64px; color: var(--hot-magenta); line-height: 1; text-shadow: 0 0 30px rgba(255,43,214,.4); }
  .display-sub  { font-family: var(--font-display); font-size: 36px; color: var(--off-white); line-height: 1.05; }
  .display-sm   { font-family: var(--font-display); font-size: 24px; color: var(--electric-blue); line-height: 1.1; text-shadow: 0 0 12px rgba(0,240,255,.4); }
  .divider { height: 1px; background: rgba(185,174,232,.1); }
</style>
</head>
<body>
  <div class="specimen">
    <div class="tag">Display / Hero — Bagel Fat One 64px</div>
    <div class="display-hero">BRAINROT MAZE</div>
  </div>
  <div class="divider"></div>
  <div class="specimen">
    <div class="tag">Display / Verdict — Bagel Fat One 36px</div>
    <div class="display-sub">Certified Rizzler</div>
  </div>
  <div class="divider"></div>
  <div class="specimen">
    <div class="tag">Display / Label — Bagel Fat One 24px</div>
    <div class="display-sm">How brainrotted are you?</div>
  </div>
</body>
</html>
