<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--void); padding: 24px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-start; }
  .swatch-row { display: flex; flex-wrap: wrap; gap: 10px; width: 100%; }
  .swatch { width: 88px; }
  .swatch-block { height: 56px; border-radius: 8px; }
  .swatch-name { font-family: var(--font-body); font-size: 11px; color: var(--muted-lavender); margin-top: 6px; }
  .swatch-hex  { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--dim); }
</style>
</head>
<body>
<div class="swatch-row">
  <div class="swatch"><div class="swatch-block" style="background:#08070f;border:1px solid #333"></div><div class="swatch-name">Void</div><div class="swatch-hex">#08070f</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#151124"></div><div class="swatch-name">Ink</div><div class="swatch-hex">#151124</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#1e1a35"></div><div class="swatch-name">Ink Light</div><div class="swatch-hex">#1e1a35</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#ff2bd6;box-shadow:0 0 14px rgba(255,43,214,.5)"></div><div class="swatch-name">Hot Magenta</div><div class="swatch-hex">#ff2bd6</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#39ff14;box-shadow:0 0 14px rgba(57,255,20,.5)"></div><div class="swatch-name">Acid Green</div><div class="swatch-hex">#39ff14</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#00f0ff;box-shadow:0 0 14px rgba(0,240,255,.5)"></div><div class="swatch-name">Electric Blue</div><div class="swatch-hex">#00f0ff</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#ff9f1c;box-shadow:0 0 14px rgba(255,159,28,.5)"></div><div class="swatch-name">Warning Orange</div><div class="swatch-hex">#ff9f1c</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#f7f0ff"></div><div class="swatch-name">Off White</div><div class="swatch-hex">#f7f0ff</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#b9aee8"></div><div class="swatch-name">Muted Lavender</div><div class="swatch-hex">#b9aee8</div></div>
  <div class="swatch"><div class="swatch-block" style="background:#7a6fa8"></div><div class="swatch-name">Dim</div><div class="swatch-hex">#7a6fa8</div></div>
</div>
</body>
</html>
