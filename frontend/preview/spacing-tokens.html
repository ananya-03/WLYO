<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--void); padding: 20px; display: flex; flex-direction: column; gap: 14px; }
  .section-label { font-family: var(--font-body); font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--dim); margin-bottom: 4px; }
  .space-row { display: flex; align-items: center; gap: 10px; margin: 3px 0; }
  .space-bar { height: 16px; background: var(--hot-magenta); opacity: .7; border-radius: 3px; }
  .space-meta { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted-lavender); }
  .radius-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .radius-block { width: 48px; height: 48px; background: var(--ink-light); border: 1.5px solid rgba(185,174,232,.25); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; padding-bottom: 6px; }
  .radius-label { font-family: 'Space Mono', monospace; font-size: 9px; color: var(--dim); margin-top: 6px; }
</style>
</head>
<body>
  <div>
    <div class="section-label">Spacing Scale</div>
    <div class="space-row"><div class="space-bar" style="width:4px"></div><div class="space-meta">--space-1 · 4px</div></div>
    <div class="space-row"><div class="space-bar" style="width:8px"></div><div class="space-meta">--space-2 · 8px</div></div>
    <div class="space-row"><div class="space-bar" style="width:12px"></div><div class="space-meta">--space-3 · 12px</div></div>
    <div class="space-row"><div class="space-bar" style="width:16px"></div><div class="space-meta">--space-4 · 16px</div></div>
    <div class="space-row"><div class="space-bar" style="width:24px"></div><div class="space-meta">--space-6 · 24px</div></div>
    <div class="space-row"><div class="space-bar" style="width:32px"></div><div class="space-meta">--space-8 · 32px</div></div>
    <div class="space-row"><div class="space-bar" style="width:48px"></div><div class="space-meta">--space-12 · 48px</div></div>
    <div class="space-row"><div class="space-bar" style="width:64px"></div><div class="space-meta">--space-16 · 64px</div></div>
    <div class="space-row"><div class="space-bar" style="width:96px"></div><div class="space-meta">--space-24 · 96px</div></div>
  </div>
  <div>
    <div class="section-label">Border Radius</div>
    <div class="radius-row">
      <div><div class="radius-block" style="border-radius:6px"></div><div class="radius-label">sm·6</div></div>
      <div><div class="radius-block" style="border-radius:10px"></div><div class="radius-label">md·10</div></div>
      <div><div class="radius-block" style="border-radius:16px"></div><div class="radius-label">lg·16</div></div>
      <div><div class="radius-block" style="border-radius:24px"></div><div class="radius-label">xl·24</div></div>
      <div><div class="radius-block" style="border-radius:999px"></div><div class="radius-label">pill</div></div>
    </div>
  </div>
</body>
</html>
