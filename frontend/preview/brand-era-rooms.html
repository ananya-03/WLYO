<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { background: var(--void); padding: 16px; display: flex; gap: 10px; flex-wrap: wrap; }
  .era-card {
    width: 120px; border-radius: 10px; padding: 12px; display: flex; flex-direction: column; gap: 6px;
    border: 1.5px solid;
  }
  .era-name { font-family: var(--font-display); font-size: 13px; line-height: 1.1; }
  .era-tag  { font-family: var(--font-body); font-size: 9px; font-weight: 700; letter-spacing: .07em; text-transform: uppercase; }
  .era-vibe { font-family: var(--font-punchline); font-size: 10px; font-weight: 700; }
</style>
</head>
<body>
  <div class="era-card" style="background:linear-gradient(135deg,#1a1508,#0f0f08);border-color:rgba(255,200,50,.3)">
    <div class="era-name" style="color:#ffd700">Certified Boomer</div>
    <div class="era-tag" style="color:rgba(255,200,50,.5)">pre-2005 · 45+</div>
    <div class="era-vibe" style="color:#b8a060">dial-up energy</div>
  </div>
  <div class="era-card" style="background:linear-gradient(135deg,#0e1420,#090e18);border-color:rgba(100,160,255,.3)">
    <div class="era-name" style="color:#6ab4ff">Millennial Coded</div>
    <div class="era-tag" style="color:rgba(100,160,255,.5)">2005-12 · 30-44</div>
    <div class="era-vibe" style="color:#5a90cc">never gonna give u up</div>
  </div>
  <div class="era-card" style="background:linear-gradient(135deg,#0f1a0a,#0a1208);border-color:rgba(57,255,20,.25)">
    <div class="era-name" style="color:#39ff14">Elder Zillennial</div>
    <div class="era-tag" style="color:rgba(57,255,20,.4)">2013-18 · 22-30</div>
    <div class="era-vibe" style="color:#2acc10">such wow very doge</div>
  </div>
  <div class="era-card" style="background:linear-gradient(135deg,#0a0f1f,#07090f);border-color:rgba(0,240,255,.25)">
    <div class="era-name" style="color:#00f0ff">Gen Z Core</div>
    <div class="era-tag" style="color:rgba(0,240,255,.4)">2018-22 · 18-25</div>
    <div class="era-vibe" style="color:#00b8c8">stonks only go up</div>
  </div>
  <div class="era-card" style="background:linear-gradient(135deg,#1a0815,#0f0510);border-color:rgba(255,43,214,.3)">
    <div class="era-name" style="color:#ff2bd6">Brainrot Native</div>
    <div class="era-tag" style="color:rgba(255,43,214,.5)">2023-26 · ≤18</div>
    <div class="era-vibe" style="color:#cc1faa">skibidi rizz sigma</div>
  </div>
</body>
</html>
